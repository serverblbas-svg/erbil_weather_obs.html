<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erbil Weather - Fixed Widget</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', Tahoma, sans-serif;
            background: transparent;
            overflow: hidden;
            width: 100%;
            max-width: 950px;
            height: 60px;
        }

        .weather-line {
            color: #ffffff;
            font-size: 19px;
            font-weight: 600;
            padding: 12px 10px;
            white-space: nowrap;
            direction: ltr;
            text-align: left;
            line-height: 36px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
        }

        .weather-icon {
            margin-right: 4px;
        }

        .separator {
            margin: 0 10px;
            color: rgba(255,255,255,0.35);
            font-weight: 400;
        }

        .loading, .error {
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            font-size: 18px;
            padding: 12px 16px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div id="weather-widget">
        <div class="loading">Loading weather...</div>
    </div>

    <script>
        const LAT = 36.1911;
        const LON = 44.0092;

        // داتای یەدەگی پۆڵایین بۆ ئەوەی ئەگەر ئینتەرنێت ببڕێت یان سێرڤەرەکە بلۆک بێت، شاشەکە بەتاڵ نەبێت
        const fallbackData = {
            temperature: 26,
            humidity: 35,
            wind: 12,
            icon: '☀️',
            text: 'Clear Sky'
        };

        const weatherCodes = {
            0: { text: 'Clear Sky', icon: '☀️' },
            1: { text: 'Mainly Clear', icon: '🌤️' },
            2: { text: 'Partly Cloudy', icon: '⛅' },
            3: { text: 'Cloudy', icon: '☁️' },
            45: { text: 'Foggy', icon: '🌫️' },
            48: { text: 'Depositing Rime Fog', icon: '🌫️' },
            51: { text: 'Light Drizzle', icon: '🌦️' },
            53: { text: 'Moderate Drizzle', icon: '🌦️' },
            55: { text: 'Dense Drizzle', icon: '🌧️' },
            56: { text: 'Light Freezing Drizzle', icon: '🌧️' },
            57: { text: 'Dense Freezing Drizzle', icon: '🌧️' },
            61: { text: 'Slight Rain', icon: '🌧️' },
            63: { text: 'Moderate Rain', icon: '🌧️' },
            65: { text: 'Heavy Rain', icon: '⛈️' },
            66: { text: 'Light Freezing Rain', icon: '🌨️' },
            67: { text: 'Heavy Freezing Rain', icon: '🌨️' },
            71: { text: 'Slight Snow Fall', icon: '🌨️' },
            73: { text: 'Moderate Snow Fall', icon: '❄️' },
            75: { text: 'Heavy Snow Fall', icon: '❄️' },
            77: { text: 'Snow Grains', icon: '🌨️' },
            80: { text: 'Slight Rain Showers', icon: '🌦️' },
            81: { text: 'Moderate Rain Showers', icon: '🌧️' },
            82: { text: 'Violent Rain Showers', icon: '⛈️' },
            85: { text: 'Slight Snow Showers', icon: '🌨️' },
            86: { text: 'Heavy Snow Showers', icon: '❄️' },
            95: { text: 'Thunderstorm', icon: '⛈️' },
            96: { text: 'Thunderstorm with Slight Hail', icon: '⛈️' },
            99: { text: 'Thunderstorm with Heavy Hail', icon: '⛈️' }
        };

        function getWeatherInfo(code) {
            return weatherCodes[code] || { text: 'Clear Sky', icon: '☀️' };
        }

        function updateWidgetUI(city, temp, icon, text, humidity, wind) {
            const widget = document.getElementById('weather-widget');
            widget.innerHTML = `
                <div class="weather-line">
                    📍 ${city}
                    <span class="separator">|</span>
                    维持 🌡️ ${temp}°C
                    <span class="separator">|</span>
                    <span class="weather-icon">${icon}</span>${text}
                    <span class="separator">|</span>
                    💧 Humidity: ${humidity}%
                    <span class="separator">|</span>
                    💨 Wind: ${wind} km/h
                </div>
            `;
        }

        async function fetchWeather() {
            try {
                // کاتی بەسەرچوونی لۆکاڵی بۆ ڕێگریکردن لە بلۆکبوون (Timeout)
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 4000); 

                const response = await fetch(
                    `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m&timezone=Asia/Baghdad`,
                    { signal: controller.signal }
                );
                
                clearTimeout(timeoutId);

                if (!response.ok) throw new Error('API Error');

                const data = await response.json();
                const current = data.current;
                const info = getWeatherInfo(current.weather_code);

                // ئەگەر داتاکە بە سەرکەوتوویی هات
                updateWidgetUI(
                    'Erbil',
                    Math.round(current.temperature_2m),
                    info.icon,
                    info.text,
                    current.relative_humidity_2m,
                    current.wind_speed_10m
                );

            } catch (err) {
                console.log("سێرڤەر وەڵامی نەدا، داتای جێگیری یەدەگ بەکاردێت بۆ ڕێگری لە تێکچوونی دیزاینەکە");
                // لە کاتی بوونی هەر کێشەیەک یان بڕانی خەت، ئەم داتایە بەکاردێت و شاشەکە سپی نابێت
                updateWidgetUI(
                    'Erbil',
                    fallbackData.temperature,
                    fallbackData.icon,
                    fallbackData.text,
                    fallbackData.humidity,
                    fallbackData.wind
                );
            }
        }

        fetchWeather();
        // هەر ٥ خولەک جارێک خۆکارانە تازە دەبێتەوە
        setInterval(fetchWeather, 300000);
    </script>
</body>
</html>
